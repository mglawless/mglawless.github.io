<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works | MG. Lawless</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
    :root { 
      --accent: #26c9df; 
      --text-dim: #999;
      --nav-width: 250px; 
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { 
      background: #000 !important; 
      color: white; 
      min-height: 100vh; 
      overflow-x: hidden; 
      font-family: 'Inter', -apple-system, sans-serif;
    }

    /* Fixed: Overlay forced to hidden on load */
    #transition-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: #000; z-index: 9999; 
      pointer-events: none; 
      transition: opacity 0.6s ease-in-out; 
      opacity: 0; 
    }

    /* --- SIDEBAR --- */
    .main-nav { 
      position: fixed; top: 40px; left: 40px; z-index: 10; 
      display: flex; flex-direction: column; gap: 20px; width: var(--nav-width);
    }
    .nav-logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 3px; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 15px; }
    .nav-links { display: flex; flex-direction: column; gap: 12px; font-size: 0.85rem; color: var(--text-dim); }
    .nav-links a { text-decoration: none; color: inherit; transition: 0.3s ease; width: fit-content; }
    .nav-links a:hover { color: #fff; transform: translateX(5px); }

    .copy-link {
      color: var(--accent); cursor: pointer; position: relative; height: 1.2rem; display: flex; align-items: center;
      transition: color 0.4s ease-in-out, transform 0.3s ease; width: fit-content;
    }
    .copy-link:hover { transform: translateX(5px); }
    .copy-link .status { 
      position: absolute; left: 0; opacity: 0; color: #4ade80; font-weight: bold; pointer-events: none; 
      white-space: nowrap; transform: translateY(5px); transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .copy-link.copied .label { opacity: 0; transform: translateY(-5px); }
    .copy-link.copied .status { opacity: 1; transform: translateY(0); }

    /* --- CONTENT --- */
    .content-wrapper { position: relative; z-index: 2; width: 100%; padding-top: 100px; padding-bottom: 200px; background: #000; }
    .works-container { max-width: 1000px; margin-left: calc(var(--nav-width) + 100px); margin-right: 60px; }
    .works-title { font-family: 'JetBrains Mono', monospace; font-size: 3rem; margin-bottom: 15px; text-transform: uppercase; }
    
    /* --- INDEX & PROJECTS --- */
    #index-container { position: relative; width: 100%; height: 350px; background: #000; border: 1px solid #1a1a1a; margin-top: 40px; display: flex; }
    #index-ui { flex: 1; z-index: 2; padding: 40px; display: flex; flex-direction: column; }
    .index-label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; letter-spacing: 5px; color: var(--accent); margin-bottom: 30px; text-transform: uppercase; }
    #auto-index { display: flex; flex-direction: column; flex-wrap: wrap; max-height: 220px; gap: 12px 60px; counter-reset: item-counter; overflow-y: auto; }
    .index-item { font-family: 'JetBrains Mono', monospace; color: #aaa; text-decoration: none; font-size: 0.8rem; transition: 0.2s ease; text-transform: uppercase; display: flex; align-items: center; }
    .index-item::before { counter-increment: item-counter; content: "ID_" counter(item-counter, decimal-leading-zero); font-size: 0.6rem; color: var(--accent); margin-right: 15px; opacity: 0.6; width: 45px; }
    .index-item:hover { color: #fff; transform: translateX(8px); }

    #three-canvas-container { width: 40%; height: 100%; border-left: 1px solid #1a1a1a; }
    .project-list-wrapper { display: flex; flex-direction: column; gap: 150px; margin-top: 100px; }
    .project-title { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; margin-bottom: 8px; text-transform: uppercase; }
    .project-tagline { color: #888; font-size: 0.8rem; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
    
    .project-media-grid { display: grid; grid-template-columns: repeat(12, 1fr); grid-gap: 8px; margin-bottom: 25px; }
    .project-media-grid > * { grid-column: span 6; position: relative; border: 1px solid #1a1a1a; border-radius: 2px; overflow: hidden; }
    .project-description { color: #bbb; font-size: 1rem; line-height: 1.8; max-width: 750px; }

    .case-study-btn {
      display: inline-block; margin-top: 20px; padding: 10px 20px;
      border: 1px solid var(--accent); color: var(--accent); text-decoration: none;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; text-transform: uppercase;
      transition: 0.3s ease;
    }
    .case-study-btn:hover { background: var(--accent); color: #000; }

    /* --- FOOTER --- */
    footer { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10; padding: 30px; text-align: center; pointer-events: none; background: #000; }
    .footer-content { pointer-events: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .social-links { display: flex; gap: 20px; align-items: center; }
    .social-icon { width: 24px; height: 24px; stroke: #444; fill: none; transition: 0.3s; }
    .social-links a:hover .social-icon { stroke: #fff; transform: translateY(-3px); }
    .footer-text { font-size: 0.65rem; color: #444; letter-spacing: 2px; text-transform: uppercase; }

    @media (max-width: 1100px) {
      .main-nav { position: relative; padding: 40px; width: 100%; }
      .works-container { margin: 0 auto; max-width: 90%; }
      #index-container { flex-direction: column; height: auto; }
      #three-canvas-container { width: 100%; height: 200px; border-left: none; border-top: 1px solid #1a1a1a; }
    }
  </style>
</head>
<body>

  <div id="transition-overlay"></div>
  
  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <a href="./" class="transition-link">Home</a>
      <a href="works.html" class="transition-link" style="color: #fff;">Works</a>
      <a href="blog.html" class="transition-link">Blog</a>
      <div class="copy-link" id="copyEmail">
        <span class="label">Copy Email</span>
        <span class="status">Email Copied ✓</span>
      </div>
    </div>
  </nav>

  <div class="content-wrapper">
    <main class="works-container">
      <h1 class="works-title">WORKS</h1>
      <div id="index-container">
        <div id="index-ui">
          <div class="index-label">System_Index</div>
          <div id="auto-index"></div>
        </div>
        <div id="three-canvas-container"></div>
      </div>
      <div class="project-list-wrapper" id="works-list"></div>
    </main>
  </div>

  <footer>
    <div class="footer-content">
      <div class="social-links">
        <a href="https://www.youtube.com/@lawless-mg" target="_blank">
          <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.14 1 12 1 12s0 3.86.46 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.86 23 12 23 12s0-3.86-.46-5.58z"></path>
            <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon>
          </svg>
        </a>
        <a href="https://steamcommunity.com/id/gunslinging1/" target="_blank">
          <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16.5 5a4.5 4.5 0 1 1-.653 8.953l-4.347 3.009a3 3 0 0 1-3 3h-.176a3 3 0 0 1-2.94-2.402l-2.56-1.098v-3.5l3.51 1.755a2.989 2.989 0 0 1 2.834-.635l2.727-3.818A4.5 4.5 0 0 1 16.5 5z"></path>
            <circle cx="16.5" cy="9.5" r="1.5"></circle>
          </svg>
        </a>
      </div>
      <div class="footer-text">©2026 / All Rights Reserved / LAWLESS / MARWAN GEBRIEL</div>
    </div>
  </footer>

  <script type="module">
    // Load projects
    fetch('works.json')
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById('works-list');
        const indexList = document.getElementById('auto-index');
        
        indexList.innerHTML = data.map((project, idx) => `
          <a href="#proj-${idx}" class="index-item">${project.title}</a>
        `).join('');

        container.innerHTML = data.map((project, idx) => `
          <section class="project-entry" id="proj-${idx}">
            <h1 class="project-title">${project.title}</h1>
            <p class="project-tagline">${project.tagline}</p>
            <div class="project-media-grid">
              ${project.media.map(item => `<div><img src="${item.url}" alt="${project.title}"></div>`).join('')}
            </div>
            ${project.description ? `<p class="project-description">${project.description}</p>` : ''}
            ${project.caseStudy ? `<a href="${project.caseStudy}" class="case-study-btn" target="_blank">Read Case Study →</a>` : ''}
          </section>
        `).join('');
      });

    // Cleanup Overlay
    window.onload = () => {
      document.getElementById('transition-overlay').style.opacity = '0';
      setTimeout(() => document.getElementById('transition-overlay').style.display = 'none', 600);
    };

    // Interaction
    document.getElementById('copyEmail').addEventListener('click', function() {
      navigator.clipboard.writeText('maroggebriel@gmail.com').then(() => {
        this.classList.add('copied');
        setTimeout(() => this.classList.remove('copied'), 2000);
      });
    });
  </script>
</body>
</html>
