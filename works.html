<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works | MG. Lawless</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
    :root { 
      --accent: #26c9df; 
      --text-dim: #666; 
      --nav-width: 250px; 
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: #000; 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: white; 
      min-height: 100vh; 
      overflow-x: hidden; 
    }

    #transition-overlay { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: #000; 
      z-index: 9999; 
      pointer-events: none; 
      transition: opacity 0.6s ease-in-out; 
    }

    /* --- LIGHTBOX OVERLAY --- */
    #lightbox {
      position: fixed;
      z-index: 10000;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #lightbox.active { display: flex; opacity: 1; }
    #lightbox img {
      max-width: 90%;
      max-height: 85%;
      border-radius: 4px;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }
    #lightbox.active img { transform: scale(1); }

    /* --- SIDEBAR NAVIGATION --- */
    .main-nav { 
      position: fixed; 
      top: 40px; 
      left: 40px; 
      z-index: 10; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; 
      width: var(--nav-width);
    }
    .nav-logo { 
      font-weight: 800; 
      font-size: 1.2rem; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      border-left: 3px solid var(--accent); 
      padding-left: 15px; 
    }
    .nav-links { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      font-size: 0.85rem; 
      color: var(--text-dim); 
    }
    .nav-links a { text-decoration: none; color: inherit; transition: 0.3s ease; width: fit-content; }
    .nav-links a:hover { color: #fff; transform: translateX(5px); }

    .copy-link {
      color: var(--accent);
      cursor: pointer;
      position: relative;
      height: 1.2rem; 
      display: flex;
      align-items: center;
      transition: color 0.4s ease-in-out, transform 0.3s ease;
      width: fit-content;
    }
    .copy-link:hover { transform: translateX(5px); }
    .copy-link .status { 
      position: absolute; left: 0; opacity: 0; color: #4ade80; font-weight: bold;
      pointer-events: none; white-space: nowrap; transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .copy-link.copied .label { opacity: 0; transform: translateY(-5px); }
    .copy-link.copied .status { opacity: 1; transform: translateY(0); }

    /* --- CONTENT AREA --- */
    .content-wrapper { 
      position: relative; 
      z-index: 2; 
      width: 100%; 
      padding-top: 100px; 
      padding-bottom: 200px; 
    }
    .works-container { 
      max-width: 900px; 
      margin-left: calc(var(--nav-width) + 100px); 
      margin-right: 60px;
    }

    /* --- WORKS HEADER --- */
    .works-header { margin-bottom: 80px; }
    .works-title { 
      font-family: 'JetBrains Mono', monospace; 
      font-size: 3rem; 
      margin-bottom: 15px; 
      text-transform: uppercase;
    }
    .works-subtitle { 
      color: var(--text-dim); 
      font-size: 1.1rem; 
      max-width: 600px;
      line-height: 1.6;
    }

    .project-list-wrapper {
      display: flex; 
      flex-direction: column; 
      gap: 150px; 
    }

    .project-entry { width: 100%; }
    .project-title { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; margin-bottom: 8px; text-transform: uppercase; }
    .project-tagline { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
    
    .project-media-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
      gap: 20px; 
      margin-bottom: 25px; 
    }
    .project-media-grid img, .project-media-grid video, .project-media-grid iframe { 
      width: 100%; height: auto; border: 1px solid #1a1a1a; border-radius: 4px; 
    }
    .project-media-grid img { cursor: zoom-in; transition: transform 0.3s ease, filter 0.3s ease; }
    .project-media-grid img:hover { filter: brightness(1.2); }

    .project-description { color: #aaa; font-size: 1rem; line-height: 1.8; max-width: 750px; }

    /* --- FOOTER --- */
    footer { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 10; padding: 30px; text-align: center; pointer-events: none; }
    .footer-content { pointer-events: auto; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .social-links { display: flex; gap: 20px; align-items: center; }
    .social-icon { width: 24px; height: 24px; stroke: #444; fill: none; transition: all 0.3s ease-in-out; }
    .social-links a:hover .social-icon { stroke: #fff; transform: translateY(-3px); filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); }
    .footer-text { font-size: 0.65rem; color: #444 !important; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; }

    @media (max-width: 1100px) {
      .main-nav { position: relative; top: 0; left: 0; padding: 40px; width: 100%; }
      .works-container { margin: 0 auto; max-width: 90%; }
      .works-title { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <div id="transition-overlay"></div>

  <div id="lightbox">
    <img src="" alt="Enlarged view">
  </div>

  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <a href="./" class="transition-link">Home</a>
      <a href="works.html" class="transition-link" style="color: #fff;">Works</a>
      <a href="blog.html" class="transition-link">Blog</a>
      <div class="copy-link" id="copyEmail">
        <span class="label">Copy Email</span>
        <span class="status">Email Copied ✓</span>
      </div>
    </div>
  </nav>

  <div class="content-wrapper">
    <main class="works-container">
      <header class="works-header">
        <h1 class="works-title">WORKS</h1>
        <p class="works-subtitle">A collection of environment studies, interactive assets, and digital worlds.</p>
      </header>

      <div class="project-list-wrapper" id="works-list"></div>
    </main>
  </div>

  <footer>
    <div class="footer-content">
      <div class="social-links">
        <a href="https://www.youtube.com/@lawless-mg" target="_blank">
          <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.14 1 12 1 12s0 3.86.46 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.86 23 12 23 12s0-3.86-.46-5.58z"></path>
            <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon>
          </svg>
        </a>
        <a href="https://steamcommunity.com/id/gunslinging1/" target="_blank">
          <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 0 0-9.92 8.79l3.5 1.54a3.5 3.5 0 0 1 6.3 2.11l4.47 2a3.5 3.5 0 1 1-.44 1.27l-4.47-2a3.5 3.5 0 0 1-5.18-3.04l-3.53-1.55A10 10 0 1 0 12 2z"/>
          </svg>
        </a>
      </div>
      <div class="footer-text">©2026 / All Right Reserved / LAWLESS / MARWAN GEBRIEL</div>
    </div>
  </footer>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const overlay = document.getElementById('transition-overlay');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = lightbox.querySelector('img');

      setTimeout(() => { overlay.style.opacity = '0'; }, 100);

      window.addEventListener('pageshow', (event) => {
        if (event.persisted) { overlay.style.opacity = '0'; }
      });

      window.openLightbox = (url) => {
        lightboxImg.src = url;
        lightbox.classList.add('active');
      };

      lightbox.addEventListener('click', () => {
        lightbox.classList.remove('active');
      });

      fetch('works.json')
        .then(res => res.json())
        .then(data => {
          const container = document.getElementById('works-list');
          container.innerHTML = data.map(project => `
            <section class="project-entry">
              <h1 class="project-title">${project.title}</h1>
              <p class="project-tagline">${project.tagline}</p>
              <div class="project-media-grid">
                ${project.media.map(item => {
                  if(item.type === 'video' && item.url.includes('youtube.com')) {
                    // Cleaner YT integration: modestbranding, rel=0, no keyboard controls
                    const videoId = item.url.split('v=')[1] || item.url.split('/').pop();
                    const cleanUrl = `https://www.youtube.com/embed/${videoId}?modestbranding=1&rel=0&showinfo=0&color=white`;
                    return `
                      <div style="width:100%; aspect-ratio:16/9;">
                        <iframe src="${cleanUrl}" 
                          style="width:100%; height:100%; border:none; border-radius:4px; filter: grayscale(0.2) contrast(1.1);" 
                          allow="autoplay; encrypted-media" allowfullscreen>
                        </iframe>
                      </div>`;
                  }
                  if(item.type === 'video') {
                    return `<video src="${item.url}" controls loop muted playsinline style="width:100%; border-radius:4px;"></video>`;
                  }
                  return `<img src="${item.url}" alt="${project.title}" style="width:100%; border-radius:4px;" onclick="openLightbox('${item.url}')">`;
                }).join('')}
              </div>
              ${project.description ? `<p class="project-description">${project.description}</p>` : ''}
            </section>
          `).join('');
        });

      document.querySelectorAll('.transition-link').forEach(link => {
        link.addEventListener('click', (e) => {
          if (link.href === window.location.href) return;
          e.preventDefault();
          overlay.style.opacity = '1';
          setTimeout(() => { window.location.href = link.href; }, 600);
        });
      });

      const emailBtn = document.getElementById('copyEmail');
      emailBtn.addEventListener('click', () => {
        navigator.clipboard.writeText('maroggebriel@gmail.com').then(() => {
          emailBtn.classList.add('copied');
          setTimeout(() => emailBtn.classList.remove('copied'), 2000);
        });
      });
    });
  </script>
</body>
</html>
