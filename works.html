<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works | MG. Lawless</title>
  <link rel="icon" type="image/jpeg" href="https://cdn.discordapp.com/attachments/1186625565168500796/1491112293696536607/634fc7589ecb8b3229528763c2a246a1.jpg">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #26c9df;
      --text-dim: #666;
      --bg: #000;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      background: var(--bg); 
      font-family: 'Inter', -apple-system, sans-serif; 
      color: white;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Navigation - EXACT MATCH TO HOME GRID */
    .main-nav { 
      position: fixed; 
      top: 40px; 
      left: 40px; 
      z-index: 100; 
      display: flex; 
      flex-direction: column; 
      gap: 20px; /* Space between Logo and Link list */
    }

    .nav-logo { 
      font-weight: 800; 
      font-size: 1.2rem; 
      letter-spacing: 3px; 
      text-transform: uppercase; 
      border-left: 3px solid var(--accent); 
      padding-left: 15px; 
    }

    .nav-links { 
      display: flex; 
      flex-direction: column; 
      gap: 8px; /* Reduced gap to 8px to match the Home page tightness */
      font-size: 0.85rem; 
      color: var(--text-dim); 
    }

    .nav-links a { 
      text-decoration: none;
      color: inherit;
      transition: 0.3s ease; 
      width: fit-content; 
    }

    .nav-links a:hover { 
      color: #fff; 
      transform: translateX(5px);
    }

    /* Copy Link Logic */
    .copy-link {
      color: var(--accent);
      cursor: pointer;
      position: relative;
      height: 1.2rem; 
      display: flex;
      align-items: center;
      transition: color 0.4s ease-in-out, transform 0.3s ease;
      width: fit-content;
    }
    .copy-link:hover { transform: translateX(5px); }
    .copy-link .status { 
      position: absolute; left: 0; opacity: 0; color: #4ade80; font-weight: bold;
      pointer-events: none; white-space: nowrap; transform: translateY(5px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .copy-link.copied .label { opacity: 0; transform: translateY(-5px); }
    .copy-link.copied .status { opacity: 1; transform: translateY(0); }

    /* The 50% Centered Container */
    .content-container {
      max-width: 50%; 
      margin: 0 auto; 
      padding-top: 100px; /* Content starts clean without a page title */
      padding-bottom: 120px;
      display: flex;
      flex-direction: column;
      gap: 150px; 
    }

    /* Project Elements */
    .project-entry { width: 100%; }
    .project-title { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 2.2rem; margin-bottom: 8px; }
    .project-tagline { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 35px; text-transform: uppercase; letter-spacing: 2px; }
    
    .project-media-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; 
      gap: 15px;
      margin-bottom: 25px;
    }
    .project-media-grid img, .project-media-grid video {
      width: 100%;
      height: auto;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      background: #0a0a0a;
    }

    .project-description { color: #aaa; font-size: 1rem; max-width: 100%; line-height: 1.8; }

    /* Mobile Sync */
    @media (max-width: 768px) {
      .main-nav { top: auto; bottom: 100px; left: 20px; }
      .content-container { max-width: 90%; padding-top: 60px; }
    }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <a href="./">Home</a>
      <a href="works.html" style="color: #fff;">Works</a>
      <a href="blog.html">Blog</a>
      <div class="copy-link" id="copyEmail">
        <span class="label">Copy Email</span>
        <span class="status">Email Copied ✓</span>
      </div>
    </div>
  </nav>

  <main class="content-container">
    <section class="project-entry">
      <h1 class="project-title">RISKY FISHING</h1>
      <p class="project-tagline">Game Design / Development</p>
      <div class="project-media-grid">
        <img src="https://via.placeholder.com/800x450" alt="Work">
        <img src="https://via.placeholder.com/800x450" alt="Work">
      </div>
      <p class="project-description">Your description for the fishing project goes here.</p>
    </section>
  </main>

  <script>
    const emailBtn = document.getElementById('copyEmail');
    const myEmail = 'maroggebriel@gmail.com';
    if (emailBtn) {
      emailBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(myEmail).then(() => {
          emailBtn.classList.add('copied');
          setTimeout(() => emailBtn.classList.remove('copied'), 2000);
        });
      });
    }
  </script>

</body>
</html>
