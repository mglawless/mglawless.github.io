<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MG. Lawless | Home</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #26c9df; --text-dim: #666; }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body, html { 
      background: #000; 
      font-family: 'Inter', sans-serif; 
      color: white; 
      height: 100%;
      width: 100%;
      overflow: hidden; /* Locked single frame */
    }

    #transition-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: #000; z-index: 9999; pointer-events: none; 
      transition: opacity 0.6s ease-in-out; 
    }

    /* --- NAVIGATION --- */
    .main-nav { 
      position: fixed; top: 40px; left: 40px; z-index: 10; 
      display: flex; flex-direction: column; gap: 20px; 
    }
    .nav-logo { 
      font-weight: 800; font-size: 1.2rem; letter-spacing: 3px; 
      text-transform: uppercase; border-left: 3px solid var(--accent); 
      padding-left: 15px; 
    }
    .nav-links { display: flex; flex-direction: column; gap: 12px; font-size: 0.85rem; color: var(--text-dim); }
    .nav-links a { text-decoration: none; color: inherit; transition: 0.3s ease; width: fit-content; }
    .nav-links a:hover { color: #fff; transform: translateX(5px); }

    .copy-link { color: var(--accent); cursor: pointer; position: relative; transition: 0.3s; width: fit-content; }
    .copy-link .status { 
      position: absolute; left: 0; opacity: 0; color: #4ade80; 
      transition: 0.3s; pointer-events: none; white-space: nowrap;
    }
    .copy-link.copied .label { opacity: 0; }
    .copy-link.copied .status { opacity: 1; transform: translateY(-5px); }

    /* --- GALAXY CONTAINER --- */
    #canvas-container { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      z-index: 1; cursor: grab;
    }
    #canvas-container:active { cursor: grabbing; }

    /* --- FOOTER --- */
    footer {
      position: fixed; bottom: 30px; left: 0; width: 100%; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 15px;
      pointer-events: none;
    }
    .social-links { display: flex; gap: 20px; pointer-events: auto; }
    .social-icon { width: 22px; height: 22px; stroke: #444; fill: none; transition: 0.3s; }
    .social-links a:hover .social-icon { stroke: #fff; transform: translateY(-3px); }
    .footer-text { font-size: 0.6rem; color: #333; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>

  <div id="transition-overlay"></div>

  <nav class="main-nav">
    <div class="nav-logo">MG. Lawless</div>
    <div class="nav-links">
      <a href="index.html" style="color: #fff;">Home</a>
      <a href="works.html" class="transition-link">Works</a>
      <a href="blog.html" class="transition-link">Blog</a>
      <div class="copy-link" id="copyEmail">
        <span class="label">Copy Email</span>
        <span class="status">Copied ✓</span>
      </div>
    </div>
  </nav>

  <div id="canvas-container"></div>

  <footer>
    <div class="social-links">
        <a href="https://www.youtube.com/@lawless-mg" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.42a2.78 2.78 0 0 0-1.94 2C1 8.14 1 12 1 12s0 3.86.46 5.58a2.78 2.78 0 0 0 1.94 2c1.72.42 8.6.42 8.6.42s6.88 0 8.6-.42a2.78 2.78 0 0 0 1.94-2C23 15.86 23 12 23 12s0-3.86-.46-5.58z"></path><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02"></polygon></svg>
        </a>
        <a href="https://steamcommunity.com/id/gunslinging1/" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 0 0-9.92 8.79l3.5 1.54a3.5 3.5 0 0 1 6.3 2.11l4.47 2a3.5 3.5 0 1 1-.44 1.27l-4.47-2a3.5 3.5 0 0 1-5.18-3.04l-3.53-1.55A10 10 0 1 0 12 2z"/></svg>
        </a>
    </div>
    <div class="footer-text">©2026 / LAWLESS / MARWAN GEBRIEL</div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script>
    // --- BACK BUTTON FIX ---
    window.onpageshow = function(event) {
        if (event.persisted) { window.location.reload(); }
    };

    const overlay = document.getElementById('transition-overlay');
    window.addEventListener('load', () => { overlay.style.opacity = '0'; });

    // --- THREE.JS GALAXY ENGINE ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // High Density Particle Cloud
    const particlesCount = 15000; 
    const posArray = new Float32Array(particlesCount * 3);
    for(let i=0; i < particlesCount * 3; i++) {
        // Creates a dense core with some drift
        posArray[i] = (Math.random() - 0.5) * (Math.random() * 8); 
    }
    
    const particlesGeometry = new THREE.BufferGeometry();
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    
    const particlesMaterial = new THREE.PointsMaterial({ 
        size: 0.004, 
        color: '#26c9df',
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending 
    });
    
    const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particlesMesh);
    camera.position.z = 2; // Closer to camera for scale

    // --- X-AXIS INTERACTION ---
    let isDragging = false;
    let previousMouseX = 0;

    container.addEventListener('mousedown', () => { isDragging = true; });
    window.addEventListener('mouseup', () => { isDragging = false; });
    
    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            const deltaX = e.clientX - previousMouseX;
            particlesMesh.rotation.y += deltaX * 0.005; 
        }
        previousMouseX = e.clientX;
    });

    function animate() {
        requestAnimationFrame(animate);
        if(!isDragging) {
            particlesMesh.rotation.y += 0.001; 
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- UTILS ---
    document.querySelectorAll('.transition-link').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            overlay.style.opacity = '1';
            setTimeout(() => { window.location.href = link.href; }, 600);
        });
    });

    const emailBtn = document.getElementById('copyEmail');
    emailBtn.addEventListener('click', () => {
        navigator.clipboard.writeText('maroggebriel@gmail.com').then(() => {
            emailBtn.classList.add('copied');
            setTimeout(() => emailBtn.classList.remove('copied'), 2000);
        });
    });
  </script>
</body>
</html>
