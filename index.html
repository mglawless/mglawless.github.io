<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Portfolio with Controls</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    canvas { display: block; }
    
    /* Navbar Styles */
    .main-nav {
      position: fixed;
      top: 30px;
      left: 30px;
      z-index: 10;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 15px;
      pointer-events: auto;
    }

    .nav-logo {
      font-weight: bold;
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-left: 2px solid #ff0000;
      padding-left: 10px;
      margin-bottom: 10px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 0.85rem;
      color: #888;
    }

    .nav-links span {
      cursor: pointer;
      transition: all 0.3s ease;
      width: fit-content;
    }

    .nav-links span:hover {
      color: #fff;
      padding-left: 5px;
    }

    /* lil-gui positioning */
    .lil-gui { --width: 300px; z-index: 11; }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-logo">M. Lawless</div>
    <div class="nav-links">
      <span>Project 01</span>
      <span>Project 02</span>
      <span>About</span>
      <span>Contact</span>
    </div>
  </nav>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GUI } from 'lil-gui';

    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(7, 4, 7);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // --- OBJECTS ---
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x111111 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const torusKnot = new THREE.Mesh(
      new THREE.TorusKnotGeometry(1, 0.3, 100, 16),
      new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.6, roughness: 0.2 })
    );
    torusKnot.position.y = 2;
    torusKnot.castShadow = true;
    scene.add(torusKnot);

    // --- LIGHTS ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambientLight);

    const spotLight = new THREE.SpotLight(0xffffff, 500);
    spotLight.position.set(5, 10, 5);
    spotLight.castShadow = true;
    spotLight.target = torusKnot;
    scene.add(spotLight);

    // --- GUI MENU SETUP ---
    const gui = new GUI();
    
    const lightFolder = gui.addFolder('Spotlight Settings');
    lightFolder.add(spotLight, 'intensity', 0, 2000);
    lightFolder.add(spotLight, 'angle', 0, Math.PI / 2);
    lightFolder.add(spotLight, 'penumbra', 0, 1);
    lightFolder.addColor(spotLight, 'color');

    const objectFolder = gui.addFolder('Object Settings');
    objectFolder.add(torusKnot.position, 'y', 0, 5).name('Float Height');
    objectFolder.addColor(torusKnot.material, 'color').name('Torus Color');
    objectFolder.add(torusKnot.material, 'metalness', 0, 1);
    objectFolder.add(torusKnot.material, 'roughness', 0, 1);

    // --- ANIMATION ---
    function animate() {
      requestAnimationFrame(animate);
      torusKnot.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
