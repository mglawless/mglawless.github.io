<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Galaxy Background</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
    
    .main-nav {
      position: fixed;
      top: 40px;
      left: 40px;
      z-index: 10;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .nav-logo {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      border-left: 3px solid #a066ff;
      padding-left: 15px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-logo">M. Lawless</div>
    <div class="nav-links">
      <span>Index</span>
      <span>Archive</span>
      <span>Information</span>
    </div>
  </nav>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- CONFIG (Mapped from your React props) ---
    const config = {
      density: 1.1,
      starCount: 15000,
      glowIntensity: 0.2,
      twinkleIntensity: 0.2,
      rotationSpeed: 0.05,
      starSpeed: 0.1,
      hue: 160 // Your requested hueShift
    };

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 2;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- GALAXY GENERATION ---
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(config.starCount * 3);
    const colors = new Float32Array(config.starCount * 3);
    const sizes = new Float32Array(config.starCount);

    for (let i = 0; i < config.starCount; i++) {
      const i3 = i * 3;

      // Position: Sphere distribution
      const radius = Math.random() * 5 * config.density;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);

      positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
      positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
      positions[i3 + 2] = radius * Math.cos(phi);

      // Color: Applying the hueShift (160 = Cyan/Blue-ish)
      const color = new THREE.Color(`hsl(${config.hue}, 80%, 70%)`);
      colors[i3] = color.r;
      colors[i3 + 1] = color.g;
      colors[i3 + 2] = color.b;

      sizes[i] = Math.random();
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    // Custom Shader Material for that "Glow" effect
    const material = new THREE.ShaderMaterial({
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      uniforms: {
        uTime: { value: 0 },
        uGlow: { value: config.glowIntensity },
        uTwinkle: { value: config.twinkleIntensity }
      },
      vertexShader: `
        attribute float size;
        varying vec3 vColor;
        uniform float uTime;
        uniform float uTwinkle;
        void main() {
          vColor = color;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          float twinkle = sin(uTime * 2.0 + position.x * 10.0) * uTwinkle;
          gl_PointSize = size * (30.0 / -mvPosition.z) * (1.0 + twinkle);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        uniform float uGlow;
        void main() {
          float d = length(gl_PointCoord - vec2(0.5));
          float strength = pow(0.05 / d, 1.5) * uGlow;
          gl_FragColor = vec4(vColor, strength);
        }
      `
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    // --- ANIMATION ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      material.uniforms.uTime.value = elapsed;

      // Rotation Speed logic
      points.rotation.y += delta * config.rotationSpeed;
      points.rotation.x += delta * config.rotationSpeed * 0.2;

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
