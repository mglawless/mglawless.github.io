<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Portfolio</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

    /* Navigation */
    .main-nav {
      position: fixed;
      top: 40px;
      left: 40px;
      z-index: 10;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .nav-logo {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      border-left: 3px solid #4df9ff; /* Cyber blue accent */
      padding-left: 15px;
      margin-bottom: 10px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 12px;
      font-size: 0.9rem;
      color: #aaa;
    }

    .nav-links span {
      cursor: pointer;
      transition: all 0.3s ease;
      width: fit-content;
    }

    .nav-links span:hover {
      color: #4df9ff;
      transform: translateX(8px);
    }
  </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-logo">M. Lawless</div>
    <div class="nav-links">
      <span>Index</span>
      <span>Archive</span>
      <span>Information</span>
    </div>
  </nav>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 1;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- GALAXY SHADER ---
    // This shader math creates the swirling star/gas effect
    const galaxyGeometry = new THREE.PlaneGeometry(2, 2);
    const galaxyMaterial = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform vec2 uResolution;
        varying vec2 vUv;

        // Simple noise function for star twinkling
        float noise(vec2 p) {
          return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }

        void main() {
          vec2 uv = (gl_FragCoord.xy - 0.5 * uResolution.xy) / min(uResolution.y, uResolution.x);
          
          float time = uTime * 0.05;
          float finalColor = 0.0;
          
          // Create star layers
          for(float i=1.0; i<4.0; i++) {
            vec2 shift = vec2(time * i * 0.1);
            float n = noise(uv * 50.0 * i + shift);
            if(n > 0.98) {
              float twinkle = sin(uTime * 2.0 + n * 10.0) * 0.5 + 0.5;
              finalColor += n * twinkle;
            }
          }

          // Nebula/Gas Glow
          vec3 nebula = vec3(0.05, 0.1, 0.2) * (1.0 - length(uv));
          vec3 color = vec3(finalColor) + nebula;
          
          gl_FragColor = vec4(color, 1.0);
        }
      `
    });

    const background = new THREE.Mesh(galaxyGeometry, galaxyMaterial);
    scene.add(background);

    // --- ANIMATION ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      
      // Update time for the shader animations
      galaxyMaterial.uniforms.uTime.value = clock.getElapsedTime();
      
      renderer.render(scene, camera);
    }
    animate();

    // --- RESIZE ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      galaxyMaterial.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
